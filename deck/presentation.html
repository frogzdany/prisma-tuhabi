</div>
<div class="refs">
<strong>Fuentes:</strong> reportes públicos TuHabi y Pulppo 2025. Buybox y cobertura: página pública TuHabi. Rechazo iBuyer: reportes financieros Opendoor 2022 a 2024. Capital IA: cobertura BBVA Spark México H1 2026.
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-class="chart" data-theme="svo1nzc2omjvb9c0v90a6acmo19b4i8gwnpwxmn1pbul" lang="es-ES" class="chart" data-marpit-pagination="4" style="--paginate:true;--class:chart;--theme:svo1nzc2omjvb9c0v90a6acmo19b4i8gwnpwxmn1pbul;" data-marpit-pagination-total="12">
<h1 id="la-fuga-en-una-gr%C3%A1fica">La fuga, en una gráfica</h1>
<p class="chart-sub">Antes: solo el segmento dentro del buybox se cierra. Después: ningún lead se tira, cada uno aterriza en su mejor ruta posible.</p>
<p><img src="assets/05-recovery.png" alt="Recuperación de leads" /></p>
<p class="chart-foot">Volúmenes ilustrativos sobre una base de 10,000 leads inbound al mes. Las proporciones están calibradas con benchmarks Opendoor y cobertura pública TuHabi.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-class="divider" data-theme="svo1nzc2omjvb9c0v90a6acmo19b4i8gwnpwxmn1pbul" lang="es-ES" class="divider" data-marpit-pagination="5" style="--paginate:true;--class:divider;--theme:svo1nzc2omjvb9c0v90a6acmo19b4i8gwnpwxmn1pbul;" data-marpit-pagination-total="12">
<h3 id="la-idea">La idea</h3>
<h1 id="un-agente-que-enruta-cada-lead-en-menos-de-treinta-segundos-sin-perder-ninguno">Un agente que enruta cada lead en menos de treinta segundos, sin perder ninguno.</h1>
<p>Conversacional desde WhatsApp y canales similares.<br />
Decide entre iBuyer, asesor Pulppo o nurture.<br />
Explica los números al vendedor (neto, comisión, tiempo).<br />
Persiste el lead en Supabase y se integra con cualquier CRM vía webhook.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-class="phases" data-theme="svo1nzc2omjvb9c0v90a6acmo19b4i8gwnpwxmn1pbul" lang="es-ES" class="phases" data-marpit-pagination="6" style="--paginate:true;--class:phases;--theme:svo1nzc2omjvb9c0v90a6acmo19b4i8gwnpwxmn1pbul;" data-marpit-pagination-total="12">
<h1 id="c%C3%B3mo-funciona-prisma">Cómo funciona Prisma</h1>
<div class="phase-grid">
  <div class="phase">
    <span class="phase-tag">FASE 1</span>
    <h3>Entiende</h3>
    <ul>
      <li>Lee el mensaje en español de México</li>
      <li>Detecta zona y tipo de propiedad</li>
      <li>Estima urgencia y motivación</li>
    </ul>
  </div>
  <div class="phase">
    <span class="phase-tag">FASE 2</span>
    <h3>Decide</h3>
    <ul>
      <li>Cruza zona contra capas de riesgo</li>
      <li>Estima valor y valida buybox</li>
      <li>Busca asesor Pulppo si aplica</li>
      <li>Calcula tres escenarios con netos</li>
    </ul>
  </div>
  <div class="phase">
    <span class="phase-tag">FASE 3</span>
    <h3>Actúa</h3>
    <ul>
      <li>Responde con voz local</li>
      <li>Guarda lead y decisión en Supabase</li>
      <li>Se integra al CRM ya conectado</li>
    </ul>
  </div>
</div>
<p class="phase-foot"><strong>Orquestador:</strong> un solo loop con Claude Haiku, bajo siete segundos por triaje. Cada paso es una API real o una capa lista para conectar. Make.com lo dispara desde cualquier canal.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-class="chart" data-theme="svo1nzc2omjvb9c0v90a6acmo19b4i8gwnpwxmn1pbul" lang="es-ES" class="chart" data-marpit-pagination="7" style="--paginate:true;--class:chart;--theme:svo1nzc2omjvb9c0v90a6acmo19b4i8gwnpwxmn1pbul;" data-marpit-pagination-total="12">
<h1 id="distribuci%C3%B3n-de-rutas">Distribución de rutas</h1>
<p class="chart-sub">Casi la mitad de los leads termina en Pulppo, ruta que hoy queda en silencio. El resto se cierra como iBuyer o queda en nurture vivo.</p>
<p><img src="assets/01-routing.png" alt="Distribución de rutas" /></p>
<p class="chart-foot">Proporciones ilustrativas calibradas con el benchmark Opendoor de rechazo (44 por ciento) y la cobertura pública iBuyer de TuHabi (11 de 32 estados).</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-class="chart" data-theme="svo1nzc2omjvb9c0v90a6acmo19b4i8gwnpwxmn1pbul" lang="es-ES" class="chart" data-marpit-pagination="8" style="--paginate:true;--class:chart;--theme:svo1nzc2omjvb9c0v90a6acmo19b4i8gwnpwxmn1pbul;" data-marpit-pagination-total="12">
<h1 id="c%C3%B3mo-escala-el-volumen">Cómo escala el volumen</h1>
<p class="chart-sub">Mismo presupuesto humano. Hasta veinticuatro veces más leads triados cuando Prisma trabaja de fondo las 24 horas y deja a los humanos para cerrar.</p>
<p><img src="assets/04-volume.png" alt="Volumen escalado" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-class="dimensions" data-theme="svo1nzc2omjvb9c0v90a6acmo19b4i8gwnpwxmn1pbul" lang="es-ES" class="dimensions" data-marpit-pagination="9" style="--paginate:true;--class:dimensions;--theme:svo1nzc2omjvb9c0v90a6acmo19b4i8gwnpwxmn1pbul;" data-marpit-pagination-total="12">
<h1 id="c%C3%B3mo-abordamos-cada-dimensi%C3%B3n">Cómo abordamos cada dimensión</h1>
<div class="dim-grid">
  <div class="dim">
    <span class="dim-tag">IMPACTO</span>
    <p>Recupera cerca de 6,200 leads al mes. Convierte rechazos por buybox en comisiones vía Pulppo.</p>
  </div>
  <div class="dim">
    <span class="dim-tag">EJECUCIÓN</span>
    <p>Corre en vivo, no en slides. Modelos reales de Anthropic y ElevenLabs. Persistencia real en Supabase.</p>
  </div>
  <div class="dim">
    <span class="dim-tag">CREATIVIDAD</span>
    <p>Triaje conversacional con tres escenarios y transparencia total de comisiones para el vendedor.</p>
  </div>
  <div class="dim">
    <span class="dim-tag">AUTOMATIZACIÓN</span>
    <p>Mismo flujo reutilizable por lead. Make.com puede invocarlo desde cualquier canal sin tocar código.</p>
  </div>
  <div class="dim">
    <span class="dim-tag">PRESENTACIÓN</span>
    <p>Tres minutos. Cuatro casos. La decisión queda visible siempre vía barra fija arriba.</p>
  </div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-class="split" data-theme="svo1nzc2omjvb9c0v90a6acmo19b4i8gwnpwxmn1pbul" lang="es-ES" class="split" data-marpit-pagination="10" style="--paginate:true;--class:split;--theme:svo1nzc2omjvb9c0v90a6acmo19b4i8gwnpwxmn1pbul;" data-marpit-pagination-total="12">
<h1 id="qu%C3%A9-pasa-el-lunes">Qué pasa el lunes</h1>
<div class="col">
<h3 id="equipo-de-adquisici%C3%B3n">Equipo de adquisición</h3>
<ul>
<li>Los nuevos mensajes llegan ya triados</li>
<li>El equipo solo revisa los listos para llamar</li>
<li>Los rechazos por buybox se vuelven inicio de la ruta Pulppo</li>
<li>Cero leads tirados al cierre del día</li>
</ul>
</div>
<div class="col">
<h3 id="asesores-pulppo">Asesores Pulppo</h3>
<ul>
<li>Reciben leads tibios, no fríos</li>
<li>Cada handoff trae contexto y valor estimado</li>
<li>Borrador de mensaje inicial listo para enviar</li>
<li>Métricas de desempeño por zona y por asesor</li>
</ul>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-class="timeline" data-theme="svo1nzc2omjvb9c0v90a6acmo19b4i8gwnpwxmn1pbul" lang="es-ES" class="timeline" data-marpit-pagination="11" style="--paginate:true;--class:timeline;--theme:svo1nzc2omjvb9c0v90a6acmo19b4i8gwnpwxmn1pbul;" data-marpit-pagination-total="12">
<h1 id="plan-de-integraciones">Plan de integraciones</h1>
<p><img src="assets/06-timeline.png" alt="Línea de tiempo de integraciones" /></p>
<p class="timeline-foot">Cada fase suma una capa real sin reescribir el agente. Lo que hoy ya corre sirve de cimiento.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-class="close" data-theme="svo1nzc2omjvb9c0v90a6acmo19b4i8gwnpwxmn1pbul" lang="es-ES" class="close" data-marpit-pagination="12" style="--paginate:true;--class:close;--theme:svo1nzc2omjvb9c0v90a6acmo19b4i8gwnpwxmn1pbul;" data-marpit-pagination-total="12">
<h1 id="prisma-1">Prisma</h1>
<h2 id="cada-mensaje-del-vendedor-en-su-mejor-ruta">Cada mensaje del vendedor en su mejor ruta.</h2>
<p>Sin lead perdido. Sin asesor improvisando. Sin vendedor a ciegas.<br />
Listo para correr el lunes.</p>
</section>
